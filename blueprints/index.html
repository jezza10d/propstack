<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Strategic Blueprints // PROPSTACK /_</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script src="../header.js" defer></script>
    <script src="../footer.js" defer></script>

    <!-- Tailwind Config injected for structural consistency -->
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#c3c6d4", "surface-container": "#16202e", "surface-container-low": "#121c2a", "outline": "#909096", "outline-variant": "#46464c", "tertiary": "#adc6ff", "on-surface": "#d9e3f6", "background": "#091421" }, spacing: { "container-max": "1280px", "gutter": "32px", "section-gap": "80px", "stack-gap": "24px" }, fontFamily: { "label-mono": ["JetBrains Mono"] } } } }
    </script>
</head>
<body class="font-body-md text-body-md min-h-screen bg-background text-on-surface">

<main-header></main-header>

<main class="max-w-screen-xl mx-auto px-5 md:px-gutter py-section-gap">
    
    <section class="mb-section-gap">
        <span class="font-label-mono text-label-mono text-tertiary uppercase tracking-[0.2em]">[ INDEX / BLUEPRINTS ]</span>
        <h1 class="font-display-xl-mobile md:font-display-xl text-display-xl-mobile md:text-display-xl mt-6 mb-8 tracking-tighter">
            Strategic Blueprints: <br><span class="text-outline">Enterprise Tech without the Fluff.</span>
        </h1>
        <p class="font-body-lg text-body-lg text-outline max-w-2xl">
            High-fidelity frameworks for architectural decision-making. No fluff, no vendor bias—just raw strategy for the modern housing enterprise.
        </p>
    </section>

    <!-- Dynamic Blueprint Feed -->
    <section id="blueprint-feed" class="flex flex-col border-t border-outline-variant/15">
        <div class="py-10 text-outline animate-pulse">Initializing blueprint retrieval...</div>
    </section>

</main>

<main-footer></main-footer>

<script>
    async function loadBlueprints() {
        const container = document.getElementById('blueprint-feed');
        try {
            // Adjust API path to your blueprints directory
            const response = await fetch('https://api.github.com/repos/jezza10d/propstack/contents/blueprints');
            const files = await response.json();
            
            // Filter for HTML files, excluding index.html
            const blueprints = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');
            
            if (blueprints.length === 0) {
                container.innerHTML = '<div class="py-10 text-outline">No blueprints currently indexed.</div>';
                return;
            }

            container.innerHTML = blueprints.map(file => {
                const title = file.name.replace('.html', '').replace(/-/g, ' ').toUpperCase();
                return `
                <a href="/blueprints/${file.name}" class="group py-12 border-b border-outline-variant/15 flex items-center justify-between hover:bg-surface-container-low transition-colors px-4 -mx-4">
                    <div class="flex flex-col gap-2">
                        <span class="font-label-mono text-label-mono text-tertiary uppercase tracking-wider">[STRATEGY]</span>
                        <h2 class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">${title}</h2>
                    </div>
                    <span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">arrow_forward</span>
                </a>
                `;
            }).join('');
        } catch (err) {
            container.innerHTML = '<div class="py-10 text-error">System Error: Blueprints unreachable.</div>';
        }
    }
    loadBlueprints();
</script>

<!-- Intersection Observer for Scroll Animation -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('opacity-100', 'translate-y-0');
                    entry.target.classList.remove('opacity-0', 'translate-y-4');
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('section, article').forEach(el => {
            el.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
            observer.observe(el);
        });
    });
</script>

</body>
</html>
