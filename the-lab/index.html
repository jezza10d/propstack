<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>THE LAB | THEPROPSTACK /_</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline": "#909096",
                        "primary": "#c3c6d4",
                        "surface-container": "#16202e",
                        "surface-container-high": "#212b39",
                        "background": "#091421",
                        "on-surface": "#d9e3f6",
                        "tertiary": "#adc6ff",
                        "outline-variant": "#46464c"
                    },
                    spacing: {
                        "container-max": "1280px",
                        "gutter": "32px",
                        "section-gap": "80px"
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #091421; color: #d9e3f6; }
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
        .bento-item { background: #0b0f19; border: 1px solid rgba(144, 144, 150, 0.15); transition: all 0.3s; }
        .bento-item:hover { border-color: rgba(144, 144, 150, 0.4); background: #121c2a; }
    </style>
</head>
<body class="font-body-md text-body-md overflow-x-hidden">

    <main-header></main-header>

    <main class="max-w-container-max mx-auto px-gutter py-section-gap">
        <section class="mb-section-gap">
            <h1 class="font-display-xl text-5xl font-bold tracking-tighter">The Infrastructure Lab</h1>
            <p class="text-on-surface-variant max-w-2xl mt-6 text-lg">
                High-fidelity edge engineering, home automation, and network topology documentation.
            </p>
        </section>

        <div class="bento-grid">
            <div class="bento-item col-span-12 md:col-span-8 p-8">
                <h2 class="font-headline-lg mb-4">Core Lab Services</h2>
                <p class="text-outline">Overview of currently active hardware and automation controllers.</p>
            </div>
            <div class="bento-item col-span-12 md:col-span-4 p-8">
                <h2 class="font-headline-md mb-4">System Telemetry</h2>
                <div class="text-tertiary font-label-mono">OPTIMAL_99.9%</div>
            </div>
        </div>
    </main>

    <main-footer></main-footer>

    <script>
        // Trigger scroll animations
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('section, .bento-item').forEach(el => {
                el.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
