<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>THE LAB | THEPROPSTACK /_</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <script src="../header.js" defer></script>
    <script src="../footer.js" defer></script>
</head>

<body class="font-body-md text-body-md overflow-x-hidden bg-background text-on-surface">

    <main-header></main-header>

    <main class="max-w-screen-xl mx-auto px-5 md:px-gutter py-section-gap">
        
        <section class="mb-section-gap">
            <div class="flex flex-col gap-4">
                <span class="font-label-mono text-label-mono text-primary uppercase tracking-widest">[ LAB_ENVIRONMENT_v4.2 ]</span>
                <h1 class="font-bold text-4xl md:text-6xl tracking-tighter">The Infrastructure Lab</h1>
                <p class="font-body-lg text-outline max-w-2xl">A clinical sandbox for physical builds, automated systems, and high-density networking. Documentation for the persistent evolution of the PROPSTACK core.</p>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-stack-gap">
            </div>

    </main>

    <main-footer></main-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                        entry.target.classList.remove('opacity-0', 'translate-y-4');
                    }
                });
            }, { threshold: 0.1 });
            
            document.querySelectorAll('article, section > div, section > h2').forEach(el => {
                el.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
