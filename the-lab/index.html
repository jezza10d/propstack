<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>THE LAB | PROPSTACK /_</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>

    <script id="tailwind-config">        
        tailwind.config = {            
            darkMode: "class",            
            theme: {                
                extend: {                    
                    "colors": {                        
                        "on-secondary-fixed-variant": "#454747",                        
                        "outline": "#909096",                        
                        "error": "#ffb4ab",                        
                        "tertiary-fixed-dim": "#adc6ff",                        
                        "on-secondary-container": "#b4b5b5",                        
                        "on-primary-fixed": "#171b26",                        
                        "inverse-primary": "#5a5e6a",                        
                        "surface-container-lowest": "#050f1c",                        
                        "secondary-fixed": "#e2e2e2",                        
                        "primary": "#c3c6d4",                        
                        "primary-fixed": "#dfe2f1",                        
                        "surface-bright": "#303a48",                        
                        "surface-container-highest": "#2b3544",                        
                        "secondary-container": "#454747",                        
                        "on-secondary-fixed": "#1a1c1c",                        
                        "tertiary": "#adc6ff",                        
                        "on-error": "#690005",                        
                        "surface-container": "#16202e",                        
                        "on-primary": "#2c303b",                        
                        "on-tertiary-fixed": "#001a42",                        
                        "surface-container-high": "#212b39",                        
                        "surface-variant": "#2b3544",                        
                        "on-background": "#d9e3f6",                        
                        "surface-container-low": "#121c2a",                        
                        "background": "#091421",                        
                        "primary-fixed-dim": "#c3c6d4",                        
                        "primary-container": "#0b0f19",                        
                        "error-container": "#93000a",                        
                        "on-tertiary-fixed-variant": "#004395",                        
                        "outline-variant": "#46464c",                        
                        "inverse-surface": "#d9e3f6",                        
                        "on-primary-container": "#787b88",                        
                        "surface": "#091421",                        
                        "on-primary-fixed-variant": "#434652",                        
                        "secondary-fixed-dim": "#c6c6c7",                        
                        "on-tertiary": "#002e6a",                        
                        "surface-dim": "#091421",                        
                        "tertiary-fixed": "#d8e2ff",                        
                        "on-tertiary-container": "#2d78ec",                        
                        "secondary": "#c6c6c7",                        
                        "surface-tint": "#c3c6d4",                        
                        "tertiary-container": "#000e2a",                        
                        "on-secondary": "#2f3131",                        
                        "on-error-container": "#ffdad6",                        
                        "on-surface": "#d9e3f6",                        
                        "on-surface-variant": "#c6c6cc",                        
                        "inverse-on-surface": "#27313f"                    
                    }
                }            
            }        
        }    
    </script>
</head>
<body class="bg-background text-on-background antialiased">

    <main-header></main-header>

    <main class="max-w-container-max mx-auto px-5 md:px-gutter py-20">
        
        <section class="mb-20">
            <h1 class="font-bold text-5xl md:text-6xl tracking-tighter mb-6">The Infrastructure Lab</h1>
            <p class="text-outline text-lg max-w-2xl">Clinical sandbox for home automation and networking experiments.</p>
        </section>

        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-8 bg-surface-container-low border border-outline-variant/20 p-8 rounded-lg">
                <h2 class="text-2xl font-bold mb-4">Bare-Metal Orchestration</h2>
                <p class="text-outline">Resilient, low-latency automation controllers.</p>
            </div>
            <div class="col-span-12 lg:col-span-4 bg-surface-container-low border border-outline-variant/20 p-8 rounded-lg">
                <h3 class="text-lg font-bold mb-4">Telemetry</h3>
                <div class="text-primary font-mono">14 Nodes Active</div>
            </div>
        </div>
    </main>

    <main-footer></main-footer>

    <script>
        // Standardized animation logic
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                        entry.target.classList.remove('opacity-0', 'translate-y-4');
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('section, .grid > div').forEach(el => {
                el.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
