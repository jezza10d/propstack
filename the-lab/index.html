<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>THE LAB | PROPSTACK /_</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="header.js"></script>
    <script src="footer.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline": "#909096",
                        "primary": "#c3c6d4",
                        "surface-container": "#16202e",
                        "surface-container-high": "#212b39",
                        "surface-container-lowest": "#050f1c",
                        "background": "#091421",
                        "on-surface": "#d9e3f6",
                        "on-surface-variant": "#c6c6cc",
                        "tertiary": "#adc6ff",
                        "outline-variant": "#46464c"
                    },
                    spacing: {
                        "container-max": "1280px",
                        "gutter": "32px",
                        "stack-gap": "24px",
                        "section-gap": "80px"
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #091421; color: #d9e3f6; scroll-behavior: smooth; }
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
        .bento-item { background: #0b0f19; border: 1px solid rgba(144, 144, 150, 0.15); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bento-item:hover { border-color: rgba(144, 144, 150, 0.4); background: #121c2a; }
        .code-block { font-family: 'JetBrains Mono', monospace; background: #050f1c; border-left: 2px solid #adc6ff; }
    </style>
</head>
<body class="font-body-md text-body-md overflow-x-hidden">

    <main-header></main-header>

    <main class="max-w-container-max mx-auto px-gutter py-section-gap">
        <section class="mb-section-gap">
            <div class="flex flex-col gap-4">
                <div class="font-label-mono text-tertiary uppercase tracking-widest">[ LAB_ENVIRONMENT_v4.2 ]</div>
                <h1 class="font-display-xl text-display-xl max-w-4xl leading-tight font-bold">
                    The Infrastructure Lab: <span class="text-outline">Iterative, Hands-On Edge Engineering.</span>
                </h1>
                <p class="font-body-lg text-on-surface-variant max-w-2xl mt-4">
                    A clinical sandbox for physical builds, automated systems, and high-density networking experiments. Documentation for the persistent evolution of the PROPSTACK core.
                </p>
            </div>
        </section>

        <div class="bento-grid">
            </div>
    </main>

    <main-footer></main-footer>

    <script>
        // Intersection Observer for Animations
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                        entry.target.classList.remove('opacity-0', 'translate-y-4');
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('article, section > div, section > h2, .bento-item').forEach(el => {
                el.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
